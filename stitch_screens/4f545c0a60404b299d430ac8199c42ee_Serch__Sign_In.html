<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Serch - Sign In</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-secondary": "#ffffff",
                        "on-primary": "#ffffff",
                        "inverse-on-surface": "#f2f0f1",
                        "on-background": "#1b1c1d",
                        "inverse-primary": "#b1c5ff",
                        "secondary": "#5a5f63",
                        "surface-bright": "#faf9fa",
                        "on-secondary-container": "#606569",
                        "secondary-fixed": "#dfe3e8",
                        "primary-container": "#3366cc",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed-dim": "#dcc661",
                        "tertiary-fixed": "#f9e37a",
                        "error": "#ba1a1a",
                        "primary-fixed": "#d9e2ff",
                        "on-surface": "#1b1c1d",
                        "on-secondary-fixed-variant": "#42474b",
                        "surface-container-highest": "#e3e2e3",
                        "on-tertiary-fixed-variant": "#524600",
                        "on-surface-variant": "#434653",
                        "on-primary-fixed": "#001946",
                        "on-error": "#ffffff",
                        "surface-container-high": "#e9e8e9",
                        "on-tertiary-fixed": "#211b00",
                        "secondary-fixed-dim": "#c2c7cc",
                        "on-tertiary-container": "#4a3f00",
                        "tertiary": "#6d5e00",
                        "secondary-container": "#dfe3e8",
                        "outline": "#737784",
                        "on-primary-container": "#e7ebff",
                        "surface-container-lowest": "#ffffff",
                        "surface-tint": "#2259bf",
                        "inverse-surface": "#303031",
                        "tertiary-container": "#bfab49",
                        "on-primary-fixed-variant": "#00419d",
                        "surface-container-low": "#f5f3f4",

                        "display": ["Noto Serif", "serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Public Sans", "sans-serif"]

<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        
        .ghost-border {
            box-shadow: inset 0 0 0 1px rgba(195, 198, 213, 0.15); /* outline-variant at 15% */
        }
        
        /* Subtle natural elevation through tonal layering */
        .elevation-surface {
            background: linear-gradient(180deg, theme('colors.surface-container-lowest') 0%, theme('colors.surface-container-low') 100%);
        }
    </style>
</head>
<body class="bg-surface-container-low text-on-surface font-body min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Note: TopNavBar and Footer suppressed per "Semantic Shell Mandate" for linear/transactional intent (Login) -->
<main class="flex-grow flex items-center justify-center p-4 sm:p-8 relative overflow-hidden">
<!-- Atmospheric Background Elements -->
<div class="absolute inset-0 pointer-events-none overflow-hidden z-0 flex items-center justify-center opacity-40">
<div class="w-[800px] h-[800px] rounded-full bg-gradient-to-tr from-surface-variant to-surface-container-lowest blur-3xl opacity-50 transform -translate-x-1/4 -translate-y-1/4"></div>
<div class="w-[600px] h-[600px] rounded-full bg-gradient-to-bl from-primary-fixed to-transparent blur-3xl opacity-20 transform translate-x-1/3 translate-y-1/3"></div>
</div>
<div class="w-full max-w-md relative z-10">
<!-- Brand Anchor -->
<div class="text-center mb-10">
<h1 class="font-headline text-4xl font-bold text-primary tracking-tight">Serch</h1>
<p class="font-body text-on-surface-variant mt-2 text-sm">The Digital Curator</p>
</div>
<!-- Login Card -->
<div class="elevation-surface rounded-xl p-8 sm:p-10 shadow-sm ghost-border relative overflow-hidden group">
<!-- Inner ambient glow -->
<div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-transparent via-primary-fixed to-transparent opacity-50"></div>
<div class="mb-8">
<h2 class="font-headline text-2xl font-semibold text-on-surface mb-2">Welcome back</h2>
<p class="font-body text-on-surface-variant text-sm leading-relaxed">Enter your credentials to access your scholarly collections and concierge services.</p>
</div>
<form action="#" class="space-y-6" method="POST">
<!-- Email Input -->
<div class="space-y-2">
<label class="block font-label text-xs uppercase tracking-widest text-on-surface-variant" for="email">Email Address</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 0;">mail</span>
</span>
<input autocomplete="email" class="block w-full pl-10 pr-3 py-3 rounded-lg bg-surface-container-lowest text-on-surface font-body text-sm border-none ring-1 ring-outline-variant/30 focus:ring-2 focus:ring-primary focus:outline-none transition-shadow duration-200" id="email" name="email" placeholder="curator@example.com" required="" type="email">
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-baseline">
<label class="block font-label text-xs uppercase tracking-widest text-on-surface-variant" for="password">Password</label>
<a class="font-label text-xs font-semibold text-primary hover:text-primary-container transition-colors" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 0;">lock</span>
</span>
<input autocomplete="current-password" class="block w-full pl-10 pr-10 py-3 rounded-lg bg-surface-container-lowest text-on-surface font-body text-sm border-none ring-1 ring-outline-variant/30 focus:ring-2 focus:ring-primary focus:outline-none transition-shadow duration-200" id="password" name="password" placeholder="••••••••" required="" type="password">
<button aria-label="Toggle password visibility" class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 0;">visibility_off</span>
</button>
</div>
</div>
<!-- Sign In Action -->
<div class="pt-2">
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg bg-gradient-to-br from-primary to-primary-container text-on-primary font-label text-sm font-bold uppercase tracking-wider hover:opacity-90 active:opacity-100 active:scale-[0.98] transition-all duration-200 shadow-sm" type="submit">
                            Sign In
                        </button>
</div>
</form>
<!-- Divider -->
<div class="mt-8 relative">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant opacity-30"></div>
</div>
<div class="relative flex justify-center text-sm font-body">
<span class="px-4 bg-surface-container-lowest text-on-surface-variant text-xs">Or continue with</span>
</div>
</div>
<!-- OAuth Actions -->
<div class="mt-8">
<button class="w-full flex items-center justify-center py-3 px-4 rounded-lg bg-surface-container-high text-on-surface font-body text-sm font-medium hover:bg-surface-container-highest transition-colors duration-200 ring-1 ring-inset ring-outline-variant/20" type="button">
<svg aria-hidden="true" class="h-5 w-5 mr-3" viewBox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
<path d="M1 1h22v22H1z" fill="none"></path>
</svg>
                        Google
                    </button>
</div>
</div>
<!-- Sign Up Prompt -->
<div class="mt-8 text-center">
<p class="font-body text-sm text-on-surface-variant">
                    Don't have an account? 
                    <a class="font-label font-semibold text-primary hover:text-primary-container transition-colors ml-1" href="/register">Sign Up</a>
</p>
</div>
</div>
</main>


<footer class="py-8 text-center border-t border-outline-variant/30 mt-auto">
    <p class="font-body text-xs text-on-surface-variant">
        © 2026 <span class="font-headline font-bold text-primary">Serch</span>. All rights reserved.
    </p>
</footer></body></html>
