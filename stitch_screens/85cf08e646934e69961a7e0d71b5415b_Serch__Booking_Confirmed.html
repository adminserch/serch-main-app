<script>
    document.addEventListener("DOMContentLoaded", () => {
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
        
        const container = document.getElementById('success-icon-container');
        if (!container) return;

        const colors = ['#094cb2', '#d9e2ff', '#bfab49', '#c2c7cc'];
        
        for (let i = 0; i < 24; i++) {
            const particle = document.createElement('div');
            particle.className = 'absolute rounded-full pointer-events-none opacity-0';
            
            const size = Math.random() * 6 + 4;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            
            const angle = Math.random() * Math.PI * 2;
            const distance = Math.random() * 80 + 50;
            const tx = Math.cos(angle) * distance;
            const ty = Math.sin(angle) * distance;
            
            particle.style.left = '50%';
            particle.style.top = '50%';
            particle.style.transform = `translate(-50%, -50%)`;
            
            container.appendChild(particle);
            
            const delay = Math.random() * 200 + 300;
            const duration = Math.random() * 600 + 600;
            
            particle.animate([
                { transform: `translate(-50%, -50%) scale(0)`, opacity: 1 },
                { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(1)`, opacity: 0 }
            ], {
                duration: duration,
                delay: delay,
                easing: 'cubic-bezier(0.175, 0.885, 0.32, 1.275)',
                fill: 'forwards'
            });
        }
    });
</script>
