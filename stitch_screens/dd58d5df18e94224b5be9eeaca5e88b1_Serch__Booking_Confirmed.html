<style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Public+Sans:wght@500;600&display=swap');
    </style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen flex items-center justify-center p-6 antialiased">
<!-- Main Content Canvas (No Nav Shell per Transactional Rule) -->
<main class="w-full max-w-xl">
<!-- Confirmation Card using Tonal Layering -->
<article class="bg-surface-container-low rounded-xl p-8 md:p-12 flex flex-col items-center text-center">
<!-- Success Icon -->
<div class="mb-8 relative">
<div class="absolute inset-0 bg-primary-fixed opacity-50 rounded-full scale-150 animate-pulse"></div>
<div class="relative bg-primary-container text-on-primary-container w-24 h-24 rounded-full flex items-center justify-center" style="background-color: rgb(51, 102, 204);">
<span class="material-symbols-outlined text-5xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<!-- Header -->
<header class="mb-10 space-y-4">
<h1 class="font-headline text-4xl md:text-5xl text-primary leading-tight font-bold tracking-tight" style="color: rgb(51, 102, 204);">
                    Booking Request Sent
                </h1>
<p class="font-body text-lg text-on-surface-variant max-w-md mx-auto leading-relaxed">
                    Provider will review and confirm shortly. We've sent a preliminary receipt to your email.
                </p>
</header>
<!-- Summary Bento/Card -->
<div class="w-full bg-surface-container-lowest rounded-xl p-6 md:p-8 space-y-6 text-left mb-10">
<!-- Provider Info -->
<div class="flex items-center space-x-4">
<div class="w-16 h-16 rounded-full overflow-hidden bg-surface-container-high shrink-0">
<img alt="Provider Portrait" class="w-full h-full object-cover" data-alt="A professional headshot of a confident woman in her early 30s, warm ambient lighting. The background is a slightly blurred, high-end, minimalist architectural space featuring pristine white and deep blue tones to match the editorial UI. The mood is welcoming and scholarly." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCVK9Ck1rzaTV_4aWHSygv2bOlXIUdRWBBwwHfx7_iy_VtoozoVndJg8k81OuXFUItwNmuTAud7zNCD_8A0RT8Ox3dZAeVIilRvLPuoYK5DJKM3Wc63alXQi9uqy_eM5yrTWxkLLGHe15EhVbcKYcRksVv3Gzejs3PQGDq1CH7QIFVc5x2LWXE_AsEL_IZB9DKjhEZ_rh-6KtKlY3dL7skbYH6AjUG83QP11zS7yJi9kmZhCaCdM9Ap6Zjpu57YybpiE-DPiWudVBI8">
</div>
<div>
<span class="block font-label text-sm text-outline mb-1 uppercase tracking-wider">Provider</span>
<h2 class="font-headline text-xl text-on-surface font-semibold">Dr. Eleanor Vance</h2>
<p class="font-body text-sm text-on-surface-variant mt-0.5">Senior Archival Consultant</p>
</div>
</div>
<!-- Spacer/Structural Separation (No Borders) -->
<div class="w-full h-4 bg-surface-container-low rounded-lg opacity-50"></div>
<!-- Service & Time Details -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div>
<span class="flex items-center space-x-2 font-label text-sm text-outline mb-2">
<span class="material-symbols-outlined text-base">work</span>
<span class="">Service</span>
</span>
<p class="font-body text-base text-on-surface font-medium">Initial Collection Assessment</p>
</div>
<div>
<span class="flex items-center space-x-2 font-label text-sm text-outline mb-2">
<span class="material-symbols-outlined text-base">calendar_month</span>
<span class="">Time Slot</span>
</span>
<p class="font-body text-base text-on-surface font-medium">Oct 24, 2023</p>
<p class="font-body text-sm text-on-surface-variant mt-0.5">10:00 AM – 11:30 AM EST</p>
</div>
</div>
</div>
<!-- Actions -->
<footer class="w-full flex flex-col sm:flex-row gap-4 justify-center">
<button class="w-full sm:w-auto px-8 py-4 bg-gradient-to-r from-primary to-primary-container text-on-primary font-body font-medium rounded-xl hover:opacity-90 transition-opacity focus:ring-4 focus:ring-primary-fixed outline-none flex items-center justify-center space-x-2" style="background: rgb(51, 102, 204);">
<span class="material-symbols-outlined text-xl">event_note</span>
<span class="">View Bookings</span>
</button>
<button class="w-full sm:w-auto px-8 py-4 bg-surface-container-high text-primary font-body font-medium rounded-xl hover:bg-surface-container-highest transition-colors focus:ring-4 focus:ring-primary-fixed outline-none" style="color: rgb(51, 102, 204);">
                    Back to Search
                </button>
</footer>
